name: AWS Resource Tagging Compliance

on:
  workflow_call:
    inputs:
      aws_region:
        required: false
        type: string
        default: "us-gov-west-1"
      role_arn:
        description: "IAM role ARN to assume via OIDC"
        required: true
        type: string
      required_tags:
        required: false
        type: string
        default: "Project,Owner,Environment,ManagedBy"
      resource_types:
        required: false
        type: string
        default: "ec2,rds,s3,eks,lambda,elbv2"
      enforce:
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  tag-audit:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          role-session-name: github-actions-tag-audit
          aws-region: ${{ inputs.aws_region }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install boto3
      - name: Run tag compliance audit
        env:
          REQUIRED_TAGS: ${{ inputs.required_tags }}
          RESOURCE_TYPES: ${{ inputs.resource_types }}
          ENFORCE: ${{ inputs.enforce }}
        run: |
          python3 << 'PYEOF'
          import boto3, json, os, sys
          region = os.environ.get("AWS_DEFAULT_REGION", "us-gov-west-1")
          required = os.environ["REQUIRED_TAGS"].split(",")
          resource_types = os.environ["RESOURCE_TYPES"].split(",")
          results = {"compliant": [], "non_compliant": [], "summary": {}}
          total = nc = 0
          def check(rid, rtype, tags):
              global total, nc
              total += 1
              td = {t.get("Key",t.get("key","")): t.get("Value",t.get("value","")) for t in (tags or [])}
              missing = [t for t in required if t not in td]
              if missing:
                  nc += 1
                  results["non_compliant"].append({"resource_id": rid, "type": rtype, "missing_tags": missing})
              else:
                  results["compliant"].append({"resource_id": rid, "type": rtype})
          if "ec2" in resource_types:
              for r in boto3.client("ec2",region_name=region).describe_instances()["Reservations"]:
                  for i in r["Instances"]:
                      if i["State"]["Name"]!="terminated": check(i["InstanceId"],"EC2",i.get("Tags",[]))
          if "rds" in resource_types:
              rds=boto3.client("rds",region_name=region)
              for db in rds.describe_db_instances()["DBInstances"]:
                  check(db["DBInstanceIdentifier"],"RDS",rds.list_tags_for_resource(ResourceName=db["DBInstanceArn"])["TagList"])
          if "s3" in resource_types:
              s3=boto3.client("s3",region_name=region)
              for b in s3.list_buckets()["Buckets"]:
                  try: tags=s3.get_bucket_tagging(Bucket=b["Name"])["TagSet"]
                  except: tags=[]
                  check(b["Name"],"S3",tags)
          if "eks" in resource_types:
              eks=boto3.client("eks",region_name=region)
              for c in eks.list_clusters()["clusters"]:
                  tags=[{"Key":k,"Value":v} for k,v in eks.describe_cluster(name=c)["cluster"].get("tags",{}).items()]
                  check(c,"EKS",tags)
          if "lambda" in resource_types:
              lam=boto3.client("lambda",region_name=region)
              for f in lam.list_functions()["Functions"]:
                  tags=[{"Key":k,"Value":v} for k,v in lam.list_tags(Resource=f["FunctionArn"])["Tags"].items()]
                  check(f["FunctionName"],"Lambda",tags)
          results["summary"]={"total":total,"compliant":total-nc,"non_compliant":nc,"rate":f"{((total-nc)/total*100) if total else 0:.1f}%"}
          json.dump(results,open("tag-audit-report.json","w"),indent=2)
          print(f"Total: {total} | Compliant: {total-nc} | Non-compliant: {nc} | Rate: {results['summary']['rate']}")
          for r in results["non_compliant"]: print(f"  [{r['type']}] {r['resource_id']} missing: {','.join(r['missing_tags'])}")
          if nc and os.environ.get("ENFORCE")=="true": sys.exit(1)
          PYEOF
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tag-audit-report
          path: tag-audit-report.json
      - name: Summary
        if: always()
        run: |
          echo "### Tag Compliance Report" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json; s=json.load(open('tag-audit-report.json'))['summary']
          print(f'| Metric | Value |\n|---|---|\n| Total | {s[\"total\"]} |\n| Compliant | {s[\"compliant\"]} |\n| Non-Compliant | {s[\"non_compliant\"]} |\n| Rate | {s[\"rate\"]} |')
          " >> $GITHUB_STEP_SUMMARY
